services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - chromadb
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PERSIST_DIR=/app/data/chroma
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

  streamlit:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - ollama
      - chromadb
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PERSIST_DIR=/app/data/chroma
    command: ["python", "-m", "streamlit", "run", "src/ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow ui --host 0.0.0.0 --backend-store-uri file:///mlruns
    restart: unless-stopped

volumes:
  app-data:
  ollama-models:
  chroma-data:
